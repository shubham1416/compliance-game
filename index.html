<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Compliance Quest - Professional</title>
<script src="node_modules/phaser/dist/phaser.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:#0f172a;">

<script>

let health = 3;
let score = 0;
let popupActive = false;

const scenarios = [
  {
    question: "You receive a suspicious phishing email from an unknown sender.",
    options: [
      "Click the attachment immediately",
      "Report to IT Security Team",
      "Forward to colleagues"
    ],
    correct: 1
  }
];

const config = {
  type: Phaser.AUTO,
  width: 1200,
  height: 700,
  physics: {
    default: 'arcade',
    arcade: { debug: false }
  },
  scene: { preload, create, update }
};

new Phaser.Game(config);

let player, cursors, walls, zone;
let healthText, scoreText;
let popupContainer;

function preload() {

  this.load.image('floor', 'https://labs.phaser.io/assets/tilemaps/tiles/gridtiles.png');

  this.load.spritesheet('employee',
    'https://labs.phaser.io/assets/sprites/dude.png',
    { frameWidth: 32, frameHeight: 48 }
  );
}

function create() {

  // Create professional floor layout
  for (let x = 0; x < 1200; x += 64) {
    for (let y = 0; y < 700; y += 64) {
      this.add.image(x, y, 'floor').setOrigin(0);
    }
  }

  walls = this.physics.add.staticGroup();

  // Office walls
  walls.create(600, 10, null).setDisplaySize(1200, 20).refreshBody();
  walls.create(600, 690, null).setDisplaySize(1200, 20).refreshBody();
  walls.create(10, 350, null).setDisplaySize(20, 700).refreshBody();
  walls.create(1190, 350, null).setDisplaySize(20, 700).refreshBody();

  player = this.physics.add.sprite(150, 350, 'employee');
  player.setCollideWorldBounds(true);

  this.physics.add.collider(player, walls);

  // Animations
  this.anims.create({
    key: 'left',
    frames: this.anims.generateFrameNumbers('employee', { start: 0, end: 3 }),
    frameRate: 10,
    repeat: -1
  });

  this.anims.create({
    key: 'turn',
    frames: [{ key: 'employee', frame: 4 }],
    frameRate: 20
  });

  this.anims.create({
    key: 'right',
    frames: this.anims.generateFrameNumbers('employee', { start: 5, end: 8 }),
    frameRate: 10,
    repeat: -1
  });

  cursors = this.input.keyboard.createCursorKeys();

  // Scenario Zone (Conference Room)
  zone = this.add.rectangle(1000, 350, 150, 300, 0x22c55e, 0.3);
  this.physics.add.existing(zone, true);
  this.physics.add.overlap(player, zone, openScenario, null, this);

  // Modern UI Panel
  this.add.rectangle(600, 30, 1200, 60, 0x111827);

  healthText = this.add.text(40, 15, "❤️ 3", { fontSize: "22px", fill: "#ffffff" });
  scoreText = this.add.text(200, 15, "⭐ 0", { fontSize: "22px", fill: "#ffffff" });

}

function update() {

  if (popupActive) return;

  player.setVelocity(0);

  if (cursors.left.isDown) {
    player.setVelocityX(-220);
    player.anims.play('left', true);
  }
  else if (cursors.right.isDown) {
    player.setVelocityX(220);
    player.anims.play('right', true);
  }
  else {
    player.anims.play('turn');
  }

  if (cursors.up.isDown) player.setVelocityY(-220);
  if (cursors.down.isDown) player.setVelocityY(220);
}

function openScenario(scene) {

  if (popupActive) return;

  popupActive = true;

  let data = scenarios[0];

  popupContainer = scene.add.container(600, 350);

  let overlay = scene.add.rectangle(0, 0, 800, 450, 0x0f172a)
    .setStrokeStyle(3, 0x22d3ee);

  let question = scene.add.text(0, -150, data.question,
    { fontSize: "26px", fill: "#ffffff", align: "center", wordWrap: { width: 650 } })
    .setOrigin(0.5);

  popupContainer.add(overlay);
  popupContainer.add(question);

  data.options.forEach((option, index) => {

    let btn = scene.add.rectangle(0, -30 + index * 90, 600, 60, 0x1f2937)
      .setInteractive();

    let txt = scene.add.text(0, -30 + index * 90, option,
      { fontSize: "22px", fill: "#ffffff" })
      .setOrigin(0.5);

    btn.on("pointerover", () => btn.setFillStyle(0x334155));
    btn.on("pointerout", () => btn.setFillStyle(0x1f2937));
    btn.on("pointerdown", () => handleAnswer(index, scene));

    popupContainer.add(btn);
    popupContainer.add(txt);
  });
}

function handleAnswer(choice, scene) {

  if (choice === scenarios[0].correct) {
    score++;
    scoreText.setText("⭐ " + score);
  } else {
    health--;
    healthText.setText("❤️ " + health);
  }

  popupContainer.destroy();
  popupActive = false;

  if (health <= 0) {
    scene.add.text(600, 350, "GAME OVER",
      { fontSize: "48px", fill: "#ef4444" }).setOrigin(0.5);
  }
}

</script>
</body>
</html>
